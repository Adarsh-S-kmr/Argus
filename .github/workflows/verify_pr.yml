name: "Verify Data Intake PR (Layer 2)"
on:
  pull_request:
    paths:
      - 'argus-extension/database.json'

jobs:
  verify-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run verification script
        run: python pipeline/verify_pr.py
